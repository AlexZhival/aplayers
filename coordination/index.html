<style>
:root{--bg:#F4F1EA;--em:#143A2D;--gold:#B0822E;--ink:#16201B;--muted:#5A6056;--line:#DCD4C2;--card:#FCFAF4;--red:#B23B2E}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(120% 95% at 50% -10%,#1C4C3B,#0f2a20);min-height:100vh;display:grid;place-items:center;font-family:"Manrope",sans-serif;padding:24px}
.box{background:var(--card);border-radius:18px;max-width:420px;width:100%;padding:38px 34px;box-shadow:0 30px 80px -20px rgba(0,0,0,.6);text-align:center}
.mono{font-family:ui-monospace,Menlo,monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:14px}

p.sub{color:var(--muted);font-size:15px;margin-bottom:22px}
label{display:block;text-align:left;font-size:13px;font-weight:700;color:var(--ink);margin:12px 0 5px}
input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:16px;font-family:inherit;background:#fff}

button{width:100%;margin-top:22px;padding:13px;border:none;border-radius:10px;background:linear-gradient(180deg,#BE8E34,#A87C24);color:#19120A;font-weight:800;font-size:16px;font-family:inherit;cursor:pointer;box-shadow:0 12px 26px -10px rgba(176,130,46,.6)}
button:active{transform:translateY(1px)}
.err{color:var(--red);font-size:14px;font-weight:700;margin-top:14px;min-height:18px}
.hint{color:var(--muted);font-size:12px;margin-top:16px}

function b2b(b64){const s=atob(b64);const a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function doDecrypt(login,password,selftest){
  const err=document.getElementById('err'); if(err) err.textContent='';
  try{
    const enc=new TextEncoder();
    const pk=await crypto.subtle.importKey('raw',enc.encode(login+':'+password),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2b(D.salt),iterations:D.iter,hash:'SHA-256'},pk,{name:'AES-CBC',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-CBC',iv:b2b(D.iv)},key,b2b(D.ct));
    let text=new TextDecoder().decode(pt);
    const M="A-PLAYERS-OK\n";
    if(!text.startsWith(M)) throw new Error('bad');
    text=text.slice(M.length);
    if(selftest){document.body.innerText='DECRYPT_OK len='+text.length;return;}
    document.open();document.write(text);document.close();
  }catch(e){
    if(selftest){document.body.innerText='DECRYPT_FAIL '+e;return;}
    if(err) err.textContent='Неверный логин или пароль';
  }
}
const goBtn=document.getElementById('go');
if(goBtn){
  const run=()=>doDecrypt(document.getElementById('lg').value.trim(),document.getElementById('pw').value,false);
  goBtn.addEventListener('click',run);
  document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')run();});
  document.getElementById('lg').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('pw').focus();});
}
