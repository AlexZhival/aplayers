<html lang="ru">
<head>

<title>A-Players · Персональный план развития</title>

<style>
:root{
  --bg:#0f1216; --panel:#171c22; --panel2:#1e252d; --line:#2a323c;
  --green:#40A86A; --green2:#52c684; --text:#e8edf2; --muted:#9aa6b2;
  --a:#71C98E; --b:#A2ECC7; --c:#92F3EC; --d:#FFBA7D; --e:#F96E6E;
  --accent:#3682F9;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.wrap{max-width:880px;margin:0 auto;padding:24px 18px 80px}
h1,h2,h3{font-weight:700;line-height:1.25}
h1{font-size:26px;margin:0 0 4px}
.sub{color:var(--muted);margin:0 0 24px}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--green),var(--green2));display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-img{height:30px;width:auto;display:block;max-width:62vw}
.prog-line{margin-top:8px;font-size:12.5px;background:rgba(54,130,249,.10);border:1px solid rgba(54,130,249,.30);border-radius:9px;padding:8px 10px}
.prog-line b{color:#6fa8ff}
.prog-fit{background:rgba(54,130,249,.09);border:1px solid rgba(54,130,249,.28);border-radius:12px;padding:12px 14px;margin:12px 0;font-size:13.5px}
.prog-fit b{color:#6fa8ff}
.beh-focus{background:rgba(255,186,125,.10);border:1px solid rgba(255,186,125,.32);border-radius:12px;padding:12px 14px;margin:12px 0;font-size:13.5px}
.beh-focus b{color:var(--d)}
.beh-link{margin-top:6px;font-size:12.5px;color:var(--d)}
.tl{margin-top:10px}
.tl-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.tl-row:last-child{border:none}
.tl-date{min-width:92px;color:var(--muted);font-size:12.5px}
.tl-role{flex:1}
.ret-res{width:100%}
.journal-link{margin-top:14px;text-align:center}
.journal-link a{color:var(--green2);text-decoration:none;font-size:13px}
.hero{background:linear-gradient(160deg,rgba(64,168,106,.15),rgba(54,130,249,.06));border:1px solid var(--line);border-radius:18px;padding:26px 24px;margin-bottom:16px}
.hero-kicker{display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--green2);background:rgba(64,168,106,.12);padding:4px 11px;border-radius:20px;margin-bottom:14px}
.hero-h1{font-size:25px;line-height:1.2;margin:0 0 10px}
.hero-sub{color:var(--muted);font-size:14.5px;line-height:1.55;margin:0 0 16px}
.hero-points{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.hero-points div{font-size:14px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
.hero-points b{color:var(--text)}
.hero-honest{font-size:13px;color:var(--d);margin:0;font-weight:600}
.hero-credit{font-size:12px;color:var(--muted);margin:12px 0 0;border-top:1px solid var(--line);padding-top:12px}
@media (max-width:560px){
  .wrap{padding:18px 14px 70px}
  .row{flex-direction:column;gap:0}
  .cat{flex-direction:column;gap:8px}
  .nav{flex-wrap:wrap;gap:10px}
  .nav>div{width:100%;display:flex;gap:10px}
  .nav>div .btn{flex:1}
  .grades{flex-wrap:wrap}
  h1{font-size:22px}
  .hero{padding:20px 16px}
  .hero-h1{font-size:20px}
  .logo-img{height:24px}
}
.brand b{font-size:15px;letter-spacing:.3px}
.steps{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap}
.steps .st{flex:1;min-width:90px;height:5px;border-radius:3px;background:var(--line)}
.steps .st.done{background:var(--green)}
.steps .st.cur{background:var(--green2)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:16px}
.field{margin-bottom:14px}
label.lbl{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
input[type=text],input[type=number],select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:11px 13px;font:inherit;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--green)}
textarea{resize:vertical;min-height:90px}
.row{display:flex;gap:12px}.row>*{flex:1}
.btn{appearance:none;border:none;cursor:pointer;font:inherit;font-weight:600;border-radius:11px;padding:13px 22px;background:var(--green);color:#06120b;transition:.15s}
.btn:hover{background:var(--green2)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
.btn.ghost:hover{border-color:var(--green)}
.nav{display:flex;justify-content:space-between;gap:12px;margin-top:8px}
.cat{display:flex;gap:12px;margin-top:6px}
.cat .opt{flex:1;border:1.5px solid var(--line);border-radius:13px;padding:18px;cursor:pointer;text-align:center;transition:.15s}
.cat .opt:hover{border-color:var(--green)}
.cat .opt.sel{border-color:var(--green);background:rgba(64,168,106,.12)}
.cat .opt .ic{font-size:26px}.cat .opt .t{font-weight:700;margin-top:6px}.cat .opt .d{font-size:12px;color:var(--muted)}
.q{border-bottom:1px solid var(--line);padding:16px 0}
.q:last-child{border-bottom:none}
.q .qt{font-weight:600;margin-bottom:10px}
.opts{display:grid;gap:8px}
.ans{display:flex;gap:10px;align-items:flex-start;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;cursor:pointer;transition:.12s}
.ans:hover{border-color:var(--green)}
.ans.sel{border-color:var(--green);background:rgba(64,168,106,.1)}
.ans input{margin-top:3px;accent-color:var(--green)}
.ans .lvl{font-weight:700;min-width:18px;color:var(--muted)}
.ans.sel .lvl{color:var(--green2)}
.ans .txt{font-size:13.5px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
.lvA{background:rgba(113,201,142,.18);color:var(--a)}
.lvB{background:rgba(162,236,199,.16);color:var(--b)}
.lvC{background:rgba(146,243,236,.14);color:var(--c)}
.lvD{background:rgba(255,186,125,.16);color:var(--d)}
.lvE{background:rgba(249,110,110,.16);color:var(--e)}
.result-hero{text-align:center;padding:10px 0 4px}
.result-hero .big{font-size:46px;font-weight:800}
.result-hero .lvl{font-size:20px;margin-top:4px}
.bar{height:10px;border-radius:6px;background:var(--line);overflow:hidden;margin:14px 0}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--green2))}
.skill-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.skill-row:last-child{border:none}
.skill-row .nm{flex:1}
.loss{background:rgba(249,110,110,.08);border:1px solid rgba(249,110,110,.25);border-radius:12px;padding:14px;margin-top:14px}
.loss b{color:var(--e)}
.portrait{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;margin:12px 0;font-size:13px;color:var(--muted)}
.grades{display:flex;gap:8px;margin:6px 0 2px}
.grades .g{flex:1;text-align:center;border:1.5px solid var(--line);border-radius:9px;padding:8px;cursor:pointer;font-size:13px}
.grades .g.sel{border-color:var(--green);background:rgba(64,168,106,.12);font-weight:700}
.skill-pick{border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:9px;cursor:pointer;transition:.12s}
.skill-pick:hover{border-color:var(--green)}
.skill-pick.sel{border-color:var(--green);background:rgba(64,168,106,.1)}
.skill-pick.reco{box-shadow:0 0 0 1px var(--green) inset}
.skill-pick .sp-top{display:flex;align-items:center;gap:8px}
.skill-pick .sp-top .nm{flex:1;font-weight:600}
.skill-pick .reco-tag{font-size:11px;font-weight:700;color:#06120b;background:var(--green2);padding:2px 8px;border-radius:20px}
.skill-pick .lvls{font-size:12px;color:var(--muted);margin-top:7px;display:none}
.skill-pick.open .lvls,.skill-pick.sel .lvls{display:block}
.skill-pick .lvls div{margin-top:4px}
.grade-sel{margin-top:11px;border-top:1px dashed var(--line);padding-top:10px}
.gs-label{font-size:12.5px;color:var(--text);margin:8px 0 5px;font-weight:600}
.muted{color:var(--muted)} .small{font-size:12.5px}
.gantt{overflow-x:auto;margin-top:12px}
.gantt-cap{font-size:12px;color:var(--muted);margin:10px 0 6px;line-height:1.4}
.gantt-cap b{color:var(--text)}
.gantt table{border-collapse:collapse;width:100%;min-width:660px;font-size:12px}
.gantt th,.gantt td{border:1px solid var(--line);padding:4px 6px}
.gantt th{background:var(--panel2);color:var(--muted);font-weight:600;text-align:center}
.gantt td{background:var(--panel2)}
.gantt .tname{text-align:left;min-width:200px;background:var(--panel)}
.gantt .cellbar{background:var(--green);height:14px;border-radius:3px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.comp{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:16px;margin-bottom:14px}
.comp h3{margin:0 0 8px;font-size:16px}
.comp .lv{font-size:13px;margin:3px 0}
.comp .lv b{color:var(--green2)}
.tasklist{margin:8px 0 0;padding-left:18px}.tasklist li{margin-bottom:6px;font-size:13.5px}
.res{font-size:12.5px;color:var(--muted)}
.spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite;margin:30px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none}
.notice{font-size:12.5px;color:var(--muted);background:var(--panel2);border:1px dashed var(--line);border-radius:10px;padding:10px 12px;margin-top:10px}
.honesty{background:rgba(255,186,125,.09);border:1px solid rgba(255,186,125,.30);border-radius:12px;padding:13px 15px;margin:4px 0 18px;font-size:13px;line-height:1.5;color:var(--text)}
.honesty b{color:var(--d)}
.honesty ul{margin:7px 0 0;padding-left:18px}
.honesty li{margin-bottom:4px}
.qhint{font-size:11.5px;color:var(--d);margin:1px 0 9px;line-height:1.35}
@media print{
  /* светлая тема для печати: переопределяем переменные → весь UI становится читабельным */
  :root{
    --bg:#ffffff; --panel:#ffffff; --panel2:#f4f6f8; --line:#cbd2da;
    --text:#0d1115; --muted:#525c66; --green2:#137a3a;
  }
  body{background:#fff;color:var(--text)}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .no-print{display:none!important}
  .steps{display:none!important}
  .brand{margin-bottom:8px}
  .card{border-color:var(--line);box-shadow:none}
  .comp{break-inside:avoid}
  h1,h2,h3{color:var(--text)}
  .gantt{overflow:visible}
  .gantt table{min-width:0;width:100%;table-layout:fixed;font-size:9.5px}
  .gantt .tname{min-width:0;width:32%}
  .gantt th,.gantt td{padding:2px 2px;word-break:break-word}
  .gantt .cellbar{height:11px;background:#23824d!important}
  /* бейджи: тёмный текст на мягком тоне — иначе пастель теряется на белом */
  .badge{color:#0d1115!important;border:1px solid var(--line)}
  .lvA{background:#d8f3e0!important}
  .lvB{background:#dbf6ea!important}
  .lvC{background:#d6f7f4!important}
  .lvD{background:#ffe9d4!important}
  .lvE{background:#ffe0e0!important}
  .prog-line,.prog-fit{background:#eaf1fe!important;border-color:#b9d0fb!important}
  .prog-line b,.prog-fit b{color:#1c4fa0!important}
  .beh-focus{background:#fff3e6!important;border-color:#ffd6ad!important}
  .beh-focus b,.beh-link{color:#9a5a17!important}
  .logo-img{filter:none}
}
</style>
</head>

// ---------- scoring ----------
function computeDiag(){
  const skills=DIAGNOSTIC.categories[state.category].skills;
  const pts=DIAGNOSTIC.scoring.points;
  let earned=0,max=0,perSkill=[];
  skills.forEach((s,i)=>{
    const a=state.answers[i];
    max+=5*s.weight;
    if(a){earned+=pts[a]*s.weight;}
    perSkill.push({skill:s.skill,weight:s.weight,answer:a,level:a||null});
  });
  const pct=max? earned/max*100 :0;
  let lvl=DIAGNOSTIC.scoring.thresholds_pct.find(t=>pct>=t.min)||{level:"E",name:"E-Player"};
  const lossPct=DIAGNOSTIC.scoring.loss_pct[lvl.level]||0;
  const turnover=parseFloat((state.person.turnover||"").replace(/[^\d.]/g,""))||0;
  const loss=turnover*lossPct/100;
  return {earned:Math.round(earned*10)/10,max:Math.round(max*10)/10,pct:Math.round(pct),
          level:lvl.level,name:lvl.name,lossPct,loss,perSkill};
}

}

// heuristic: recommend up to 3 role skills, prioritising the person's weak diagnostic areas.
// scored so рекомендации НИКОГДА не пропадают (всегда есть приоритеты под прокачку).
function recommendSkills(){
  if(!state.diag||!state.role) return [];
  const weak=state.diag.perSkill.filter(s=>["C","D","E"].includes(s.level)).map(s=>s.skill.toLowerCase());
  const KW=["страт","план","приорит","результат","цел","команд","мотив","анализ","реш","данн","контрол","делег","финанс","эконом","комм","переговор","продаж","найм","процесс","клиент"];
  const scored=state.role.skills.map((s,i)=>{
    const n=(s.skill||"").toLowerCase();
    let wsc=0, gsc=0;
    weak.forEach(w=>KW.forEach(k=>{ if(w.includes(k)&&n.includes(k)) wsc+=1; }));  // связь со СЛАБОЙ зоной диагностики
    KW.slice(0,10).forEach(k=>{ if(n.includes(k)) gsc+=1; });                      // общая управленческая значимость
    return {i,wsc,gsc};
  }).filter(x=>x.wsc>0||x.gsc>0)
    .sort((a,b)=> (b.wsc-a.wsc) || (b.gsc-a.gsc));   // слабые зоны в приоритете, общий вес — тай-брейк
  const idx = scored.length ? scored.slice(0,3).map(x=>x.i)
                            : state.role.skills.slice(0,3).map((_,i)=>i);          // дефолт: первые 3
  return idx;
}

async function generate(){
  const prompt=buildPrompt();
  const area=$("#genArea");
  if(window.claude && typeof window.claude.complete==="function"){
    try{
      const raw=await window.claude.complete(prompt);
      const plan=parsePlan(raw);
      if(plan){state.plan=plan;renderPlan();return;}
      area.innerHTML=fallbackUI(prompt,"Не удалось разобрать ответ ИИ. Можно сгенерировать вручную.");
    }catch(e){
      area.innerHTML=fallbackUI(prompt,"ИИ недоступен ("+esc(e.message||e)+"). Используйте ручной режим ниже.");
    }
  }else{
    area.innerHTML=fallbackUI(prompt,"Финальный шаг — собрать план через ИИ. Сделайте по инструкции ниже, это займёт минуту.");
  }
}
function parsePlan(raw){
  try{
    let t=String(raw).trim().replace(/^```json/i,"").replace(/^```/,"").replace(/```$/,"").trim();
    const a=t.indexOf("{"),b=t.lastIndexOf("}");
    if(a>=0&&b>a)t=t.slice(a,b+1);
    const p=JSON.parse(t);
    if(p&&p.competencies)return p;
  }catch(e){}
  return null;
}

function ganttHTML(tasks,q){

      const s=Math.max(1,t.start_week||1),e=Math.min(q,t.end_week||s);
      return `<tr><td class="tname">${esc(t.title)}</td>${weeks.map(w=>`<td>${(w>=s&&w<=e)?'<div class="cellbar"></div>':''}</td>`).join("")}</tr>`;
    }).join("")}
  </table></div>`;
}

  const blob=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=fname;
  document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function journalName(){const n=(state.journal&&state.journal.person_name)||state.person.name||"участник";return "ИПР-журнал-"+n.replace(/\s+/g,"_")+".json";}
function buildEntry(){
  return {saved_at:nowISO(), person:{...state.person}, category:state.category,
    role:state.role?{title:state.role.title,file:state.role.file}:null,
    diag:state.diag, projects:state.projects, picked:state.picked, grades:state.grades,
    plan:state.plan, retro:null};
}
function savePlanToJournal(){
  if(!state.plan){alert("Сначала сформируйте план.");return;}
  const entry=buildEntry();
  const j=state.journal||{type:"a-players-pdp-journal",person_name:state.person.name||"",entries:[]};
  if(state._curIdx==null){ j.entries.push(entry); state._curIdx=j.entries.length-1; }
  else { j.entries[state._curIdx]=entry; }
  state.journal=j;
  downloadJSON(j, journalName());
  const b=$("#saveJournalPlan"); if(b){b.textContent="✓ Сохранено";}
}
function loadJournalFile(e){
  const f=e.target.files&&e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{
      const j=JSON.parse(r.result);
      if(!j||!Array.isArray(j.entries)||!j.entries.length){alert("Это не похоже на файл журнала PDP.");return;}
      state.journal=j; state.mode="journal"; state.retro={items:{},overall:""};
      const last=j.entries[j.entries.length-1];
      if(last&&last.retro){ state.retro={items:{...(last.retro.items||{})},overall:last.retro.overall||""}; }
      render();
    }catch(err){alert("Не удалось прочитать файл: "+(err.message||err));} };
  r.readAsText(f);
}
function scrJournal(){
  const j=state.journal, entries=j.entries, last=entries[entries.length-1];
  const tl=entries.map(e=>{const d=e.diag||{};
    return `<div class="tl-row"><span class="tl-date">${esc(e.saved_at||"—")}</span>`+
      `<span class="tl-role">${esc((e.role&&e.role.title)||"")}</span>`+
      `<span class="badge lv${esc(d.level||"")}">${esc(d.name||"—")}</span>`+
      `<span class="small muted">${d.pct!=null?d.pct+"%":""}</span></div>`;}).join("");
  let delta="";
  if(entries.length>=2){const a=entries[entries.length-2].diag||{}, b=last.diag||{};
    if(a.pct!=null&&b.pct!=null){const dd=b.pct-a.pct;
      delta=`<div class="small" style="margin-top:8px">Дельта к прошлому кварталу: <b style="color:${dd>=0?'var(--green2)':'var(--e)'}">${dd>=0?'+':''}${dd}%</b> · ${esc(a.name||'')} → ${esc(b.name||'')}</div>`;}}
  const plan=last.plan||{competencies:[]};
  const st=[["done","✅ Сделано"],["partial","🟡 Частично"],["no","⬜ Нет"]];
  const retroForm=(plan.competencies||[]).map((c,i)=>{const r=state.retro.items[i]||{};
    return `<div class="comp"><h3 style="font-size:15px">${esc(c.name)}</h3>`+
      `<div class="grades">${st.map(([k,lbl])=>`<div class="g ${r.status===k?'sel':''}" data-ri="${i}" data-rs="${k}">${lbl}</div>`).join("")}</div>`+
      `<input type="text" class="ret-res" data-ri="${i}" placeholder="Что получилось / результат, цифры" value="${esc(r.result||'')}" style="margin-top:8px"></div>`;}).join("");
  return `<div class="card">
    <h1>🗒 Журнал развития · ${esc(j.person_name||'')}</h1>
    <p class="sub">${entries.length} ${entries.length===1?'запись':'записей'} в журнале — ваш бортовой журнал PDP по кварталам.</p>
    <div class="tl">${tl}</div>
    ${delta}
  </div>
  <div class="card">
    <h2 style="font-size:18px">Ретроспектива последнего квартала</h2>
    <p class="sub">${esc((last.role&&last.role.title)||'')} · ${esc(last.saved_at||'')}. Отметьте, что удалось, и зафиксируйте результаты — это ваше перформанс-ревью.</p>
    ${last.plan?retroForm:'<p class="muted">В последней записи нет плана.</p>'}
    <div class="field" style="margin-top:12px"><label class="lbl">Главные выводы квартала</label><textarea id="retroOverall" placeholder="Что сработало, что нет, что переносим в новый квартал">${esc(state.retro.overall||'')}</textarea></div>
    <div class="nav"><button class="btn ghost" id="journalClose">← Закрыть</button>
      <div style="display:flex;gap:10px">
        <button class="btn ghost" id="saveJournalBtn">💾 Сохранить журнал</button>
        <button class="btn" id="newQuarterBtn">➕ Новый квартал →</button>
      </div></div>
  </div>`;
}
function saveJournalRetroToEntry(){
  const j=state.journal; if(!j||!j.entries.length)return;
  j.entries[j.entries.length-1].retro={items:state.retro.items,overall:state.retro.overall};
}
function wireJournal(){
  document.querySelectorAll(".g[data-rs]").forEach(g=>g.addEventListener("click",()=>{
    const i=+g.dataset.ri; state.retro.items[i]=state.retro.items[i]||{}; state.retro.items[i].status=g.dataset.rs; render();}));
  document.querySelectorAll(".ret-res").forEach(inp=>inp.addEventListener("input",()=>{
    const i=+inp.dataset.ri; state.retro.items[i]=state.retro.items[i]||{}; state.retro.items[i].result=inp.value;}));
  $("#retroOverall")&&$("#retroOverall").addEventListener("input",e=>state.retro.overall=e.target.value);
  $("#journalClose")&&$("#journalClose").addEventListener("click",()=>{state.mode=null;render();});
  $("#saveJournalBtn")&&$("#saveJournalBtn").addEventListener("click",()=>{saveJournalRetroToEntry();downloadJSON(state.journal,journalName());const b=$("#saveJournalBtn");if(b)b.textContent="✓ Сохранено";});
  $("#newQuarterBtn")&&$("#newQuarterBtn").addEventListener("click",()=>{
    saveJournalRetroToEntry();
    state.mode=null; state.step=0;
    state.answers={}; state.diag=null; state.picked=[]; state.grades={}; state.plan=null;
    state.retro={items:{},overall:""}; state._curIdx=null;
    render();});
}

// ---------- wiring per screen ----------
const wire={
  0(){
    const sync=()=>{state.person.name=$("#f_name").value;state.person.company=$("#f_company").value;state.person.turnover=$("#f_turn").value;state.person.about=$("#f_about").value;
      const turn=parseFloat((state.person.turnover||"").replace(/[^\d.]/g,""))||0;
      $("#next0").disabled=!(state.person.name.trim()&&state.category&&turn>0);};
    ["f_name","f_company","f_turn","f_about"].forEach(id=>$("#"+id).addEventListener("input",sync));
    document.querySelectorAll(".cat .opt").forEach(o=>o.addEventListener("click",()=>{state.category=o.dataset.cat;render();}));
    document.querySelectorAll("#btypeSel .g").forEach(g=>g.addEventListener("click",()=>{state.person.btype=(state.person.btype===g.dataset.bt?"":g.dataset.bt);render();}));
    document.querySelectorAll("#stageSel .g").forEach(g=>g.addEventListener("click",()=>{state.person.stage=(state.person.stage===g.dataset.st?"":g.dataset.st);render();}));
    $("#next0").addEventListener("click",()=>{if($("#next0").disabled)return;go(1);});
    $("#openJournal")&&$("#openJournal").addEventListener("click",e=>{e.preventDefault();$("#journalFile").click();});
    $("#journalFile")&&$("#journalFile").addEventListener("change",loadJournalFile);
    sync();
  },
  1(){
    document.querySelectorAll(".ans").forEach(a=>a.addEventListener("click",()=>{
      state.answers[+a.dataset.q]=a.dataset.l;render();}));
    $("#back1").addEventListener("click",()=>go(0));
    $("#next1").addEventListener("click",()=>{
      const total=DIAGNOSTIC.categories[state.category].skills.length;
      const done=Object.keys(state.answers).length;
      if(done<total){$("#warn1").textContent=`Отвечено ${done} из ${total}. Ответьте на все вопросы для точного результата.`;return;}
      go(2);});
  },
  2(){$("#back2").addEventListener("click",()=>go(1));$("#next2").addEventListener("click",()=>go(3));},
  3(){
    $("#roleSel").addEventListener("change",e=>{state.role=e.target.value!==""?ROLES[+e.target.value]:null;state.grades={};state.picked=[];render();});
    $("#projects")&&$("#projects").addEventListener("input",e=>state.projects=e.target.value);
    $("#back3").addEventListener("click",()=>go(2));
    $("#next3").addEventListener("click",()=>{
      if(!state.role)return;
      if(!state.projects.trim()){alert("Опишите хотя бы один ключевой проект — план развития строится с привязкой к вашим проектам.");$("#projects")&&$("#projects").focus();return;}
      go(4);});
  },
  4(){
    document.querySelectorAll(".skill-pick").forEach(el=>{
      el.addEventListener("click",ev=>{
        const t=ev.target;
        if(t.dataset&&t.dataset.gk){
          const i=+t.dataset.gi;
          state.grades[i]=state.grades[i]||{};
          state.grades[i][t.dataset.gk]=t.dataset.g;
          render();return;
        }
        const i=+el.dataset.i;
        if((t.dataset&&t.dataset.cb!==undefined)||t.tagName==="INPUT"){togglePick(i);}
        else if(!state.picked.includes(i)){el.classList.toggle("open");}
      });
    });
    $("#back4").addEventListener("click",()=>go(3));
    $("#next4").addEventListener("click",()=>{
      const ready=state.picked.length>0 && state.picked.every(i=>state.grades[i]&&state.grades[i].current&&state.grades[i].target);
      if(ready)go(5);
    });
  },
  5(){
    generate();
    if(!wire._p5){document.addEventListener("click",planClicks);wire._p5=true;}
  }
};
function togglePick(i){
  const idx=state.picked.indexOf(i);
  if(idx>=0){state.picked.splice(idx,1);delete state.grades[i];}
  else{ if(state.picked.length>=3){$("#pickWarn").textContent="Можно выбрать максимум 3 навыка — снимите один, чтобы добавить другой.";return;} state.picked.push(i);state.grades[i]=state.grades[i]||{};}
  render();
}
function planClicks(e){
  if(e.target.id==="copyBtn"){const t=$("#promptStore");navigator.clipboard.writeText(t.value);e.target.textContent="✓ Скопировано";}
  if(e.target.id==="openClaude"){window.open("https://claude.ai/new","_blank");}
  if(e.target.id==="openGpt"){window.open("https://chatgpt.com/","_blank");}
  if(e.target.id==="retryBtn"){$("#genArea").innerHTML='<div class="spinner"></div>';generate();}
  if(e.target.id==="renderBtn"){const p=parsePlan($("#pasteJson").value);if(p){state.plan=p;renderPlan();}else{$("#pickWarn");alert("Не удалось разобрать JSON. Проверьте, что вставлен полный ответ.");}}
}

render();
</script>
</body>
</html>
